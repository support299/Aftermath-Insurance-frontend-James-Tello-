# SPA cache headers for clover-deal-insight frontend.
# Include inside the server {} block that serves /var/www/dist, e.g.:
#   include /etc/nginx/snippets/frontend-spa-cache.conf;
#
# Also add no-cache headers to your existing `location /` block:
#   add_header Cache-Control "no-cache, no-store, must-revalidate" always;

location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}

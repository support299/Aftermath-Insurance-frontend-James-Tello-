  <body>
    <div id="root"></div>
    <!-- Runs before the app bundle; fixes white screen when cached HTML points at deleted /assets/* files -->
    <script>
      (function () {
        var K = "app-chunk-reload";
        var P = "_cb";
        function bustReload() {
          if (sessionStorage.getItem(K)) return;
          sessionStorage.setItem(K, "1");
          var u = new URL(location.href);
          u.searchParams.set(P, String(Date.now()));
          location.replace(u.toString());
        }
        window.addEventListener(
          "error",
          function (e) {
            var t = e.target;
            if (!t) return;
            var href = t.src || t.href || "";
            if (
              (t.tagName === "SCRIPT" || t.tagName === "LINK") &&
              href.indexOf("/assets/") !== -1
            ) {
              bustReload();
            }
          },
          true,
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
